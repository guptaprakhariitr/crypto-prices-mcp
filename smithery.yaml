# Smithery registry config — https://smithery.ai/docs/build/project-config/smithery-yaml
# This is an HTTP-transport MCP server; Smithery hosts the listing and proxies
# clients straight to our Cloudflare Workers endpoint.

name: crypto-prices-mcp
displayName: Crypto Prices (CoinGecko)
description: |
  Live + historical cryptocurrency prices, trending coins, and global market snapshots — wraps CoinGecko's free API.
homepage: https://crypto-prices-mcp.atlasword.workers.dev
repository: https://github.com/guptaprakhariitr/crypto-prices-mcp
license: MIT
version: "0.1.0"

runtime: container

startCommand:
  type: http
  url: https://crypto-prices-mcp.atlasword.workers.dev/mcp
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        title: API key (optional)
        description: |
          Bearer token from https://crypto-prices-mcp.atlasword.workers.dev/upgrade.
          Leave blank for the anonymous free tier (~100 calls/month/IP).
    required: []
  exampleConfig:
    apiKey: ""
  commandFunction: |-
    (config) => ({
      type: "http",
      url: "https://crypto-prices-mcp.atlasword.workers.dev/mcp",
      headers: config.apiKey ? { Authorization: `Bearer ${config.apiKey}` } : {}
    })

remote:
  type: http
  url: https://crypto-prices-mcp.atlasword.workers.dev/mcp

categories:
  - finance
  - crypto
tags:
  - crypto
  - bitcoin
  - ethereum
  - coingecko
  - prices
  - market-cap

tools:
  - name: crypto_prices
  - name: crypto_search
  - name: crypto_history
  - name: crypto_trending
  - name: crypto_market_global

auth:
  type: bearer
  required: false
  description: |
    Optional. Anonymous free tier works for ~100 calls/month per IP. For higher
    quotas, grab a key from https://crypto-prices-mcp.atlasword.workers.dev/upgrade and pass
    it as `Authorization: Bearer <key>`.
